  test-sent: "{prefix} &aPreview sent."
  unknown-command: "{prefix} &cUnknown command. &7Use &f/deathmessages help&7."
  player-only: "{prefix} &cOnly players can use this command."
  theme-list: "{prefix} &7Installed themes: &f{themes}"
  theme-applied: "{prefix} &aTheme &f{theme} &awas copied into messages.yml and loaded."
