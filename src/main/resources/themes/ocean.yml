prefix: "&8[&3Tide&8]"

commands:
  help:
    - "{prefix} &8&m------------&r &c&lCommand Center &8&m------------"
    - "&c/deathmessages reload &8- &7Reload config, messages, and themes safely."
    - "&c/deathmessages version &8- &7Show the loaded plugin version."
    - "&c/deathmessages test <type|all> [self|global|world|radius|disabled] &8- &7Preview one category or every death message."
    - "&c/deathmessages theme list &8- &7Show installed themes."
    - "&c/deathmessages theme preview <theme> &8- &7Preview a theme before using it."
    - "&c/deathmessages theme apply <theme> &8- &7Copy a theme into messages.yml with a backup."
